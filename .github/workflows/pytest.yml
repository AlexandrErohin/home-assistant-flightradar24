name: Python Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          
          # Install core testing tools AND pytest-cov for coverage
          pip install pytest pytest-cov pytest-asyncio pytest-homeassistant-custom-component hassil home-assistant-intents mutagen ha-ffmpeg pymicro-vad pyspeex-noise
          
          # MAGIC TRICK: Find the manifest.json, extract its requirements, and install them automatically!
          if ls custom_components/*/manifest.json 1> /dev/null 2>&1; then
            jq -r '.requirements[]?' custom_components/*/manifest.json | xargs -r pip install
          fi
          
          # Also install requirements.txt if you ever use one
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Pytest and generate coverage
        # LET OP HET SCHUINE STREEPJE HIERONDER: custom_components/
        # Dit vertelt pytest-cov dat het in die map naar ALLE bestanden moet zoeken.
        run: |
          pytest tests/ -v --cov=custom_components/ --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
